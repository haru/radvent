# .specify/branch-convention.yml
# Branch and folder naming convention for spec-kit
# Convention: gitflow

convention:
  branch_pattern: "{type}/{seq}-{kebab}"
  folder_pattern: "{seq}-{kebab}"
  type_prefix:
    feature: "feature"
    bugfix: "fix"
    hotfix: "hotfix"
    refactor: "refactor"
    docs: "docs"
  default_type: "feature"
  seq_padding: 3
  seq_start: 3
  date_format: "YYYYMMDD"
  ticket_pattern: "[A-Z]+-[0-9]+"
  max_length: 60
  separator: "-"
  lowercase: true
